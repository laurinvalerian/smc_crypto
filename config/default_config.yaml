# ═══════════════════════════════════════════════════════════════════
#  SMC Crypto Trading Bot – Default Configuration
#  All tunable parameters for Optuna optimization and live trading
# ═══════════════════════════════════════════════════════════════════

# ── Account & Risk ────────────────────────────────────────────────
account:
  size: 100_000            # USDT starting balance (fixed)
  currency: "USDT"

equity_display_multipliers:    # Dashboard-only multiplier (does NOT affect trading/sizing)
  crypto: 20                  # Binance testnet ~5K * 20 = 100K equivalent on dashboard

leverage:
  min: 5
  max: 15                  # Hard cap – funding & liquidation safety

risk_per_trade:
  min: 0.003               # 0.3 %
  max: 0.015               # 1.5 %

risk_reward:
  options: [2.0, 2.5, 3.0, 3.5]   # min_rr filter (TP is structure-based, min 2.0 aligned with tier gates)

# ── Volume Filter (3-Layer AAA++ Scoring) ────────────────────────
volume_filter:
  enabled: true            # AAA++ mode: strict volume filtering
  rank_threshold: 100      # Only trade coins inside top-100 by 30d volume
  max_crypto_symbols: 30   # Top 30 crypto coins for backtest/trading (by liquidity)
  lookback_days: 30        # Rolling window for volume ranking
  update_interval_hours: 1 # Live: re-rank every hour
  min_relative_ratio: 1.5  # Current vol must be >= 1.5x 100-bar avg
  min_dollar_vol_5m:       # Minimum $ volume per 5m bar
    crypto: 50000
    forex: 100000
    stocks: 100000
    commodities: 50000

# ── Trading Styles ────────────────────────────────────────────────
styles:
  day:
    entry_tf: "5m"         # 5m decision/entry timeframe (crypto sweet spot)
    confirm_tf: "1h"       # 1H structure confirmation
    weight: 1.0
    max_hold_bars: 96      # ~8 h in 5 m bars

# ── SMC Indicator Settings ────────────────────────────────────────
smc:
  swing_length: 8                 # Swing detection lookback (tighter for crypto)
  fvg_threshold: 0.0004           # Min FVG gap as fraction of price (lower for crypto volatility)
  order_block_lookback: 15        # Bars to look back for OB detection
  liquidity_range_percent: 0.005  # ±0.5 % around swing highs/lows
  bos_choch_lookback: 50          # Bars for BOS/CHoCH detection
  session_ranges:                 # UTC times
    asian:  ["00:00", "06:00"]
    london: ["07:00", "10:00"]
    new_york: ["13:00", "16:00"]

# ── Top-Down Analysis ────────────────────────────────────────────
top_down:
  bias_tf: "1d"            # Daily bias direction
  structure_tf: "1h"       # 1H structure confirmation
  entry_zone_tf: "15m"     # 15 m FVG / liquidity entry zone
  decision_tf: "5m"        # 5m bar-by-bar iteration (crypto sweet spot)
  alignment_threshold: 0.65 # Min alignment score [0-1] to take a trade (raised for AAA++)

# ── AAA++ Filter Settings ───────────────────────────────────────
aaa_plus_plus:
  min_adx: 25              # ADX floor (1H) – below this = choppy/ranging
  min_session_score: 0.8   # Only trade in optimal sessions
  min_zone_quality: 0.7    # Zone must be fresh, unmitigated, well-formed
  min_volume_score: 0.6    # 3-layer volume must pass
  require_momentum: true   # RSI + MACD must be confluent
  require_all_tf_aligned: true  # 4/4 timeframes must agree on direction
  tiers:
    "AAA++":
      min_score: 0.88
      min_rr: 3.0
      base_risk: 0.01       # 1.0%
      max_risk: 0.015        # 1.5%
      max_leverage: 10
    "AAA+":
      min_score: 0.78
      min_rr: 2.0
      base_risk: 0.005       # 0.5%
      max_risk: 0.01          # 1.0%
      max_leverage: 10

# ── Multi-Asset SMC Profiles ────────────────────────────────────
smc_profiles:
  crypto:
    swing_length: 8
    fvg_threshold: 0.0006
    order_block_lookback: 20
    liquidity_range_percent: 0.01
    min_daily_atr_pct: 0.008
    min_5m_atr_pct: 0.0015
  forex:
    swing_length: 20            # Forex structure develops slower than crypto
    fvg_threshold: 0.001        # 1 pip — tick volume needs larger gaps to detect real FVGs
    order_block_lookback: 30    # Wider lookback for slower OB formation
    liquidity_range_percent: 0.008  # Forex liquidity pools are wider
    min_daily_atr_pct: 0.004
    min_5m_atr_pct: 0.0005
  stocks:
    swing_length: 10
    fvg_threshold: 0.0003
    order_block_lookback: 20
    liquidity_range_percent: 0.005
    min_daily_atr_pct: 0.010
    min_5m_atr_pct: 0.0010
  commodities:
    swing_length: 10
    fvg_threshold: 0.0004
    order_block_lookback: 20
    liquidity_range_percent: 0.005
    min_daily_atr_pct: 0.006
    min_5m_atr_pct: 0.0008

# ── Per-Class Tier Flag Configuration ──────────────────────────────
# Flags to SKIP per asset class for AAA++ / AAA+ tier gates.
# Skipped flags still contribute to the alignment SCORE (weighted),
# but are not required as boolean gates for tier classification.
tier_flags:
  skip_flags:
    crypto: []                    # Real volume — all flags required
    forex: [volume_ok]            # Tick volume — skip volume gate
    stocks: []                    # Real volume — all flags required
    commodities: [volume_ok]      # Tick volume — skip volume gate
  # Safety throttle: max new signals per SYMBOL per 4-hour window (by asset class).
  # Note: Python module constants (TIER_SKIP_FLAGS, MAX_SIGNALS_PER_SYMBOL_4H) are
  # the runtime source of truth. Edit those in live_multi_bot.py if tuning.
  max_signals_per_symbol_4h:
    crypto: 5
    forex: 3                      # Conservative until forex signals are validated
    stocks: 5
    commodities: 2

# ── Tuning Ranges (Optuna overrides) ─────────────────────────────
tuning:
  alignment_threshold_min: 0.60
  alignment_threshold_max: 0.90
  swing_length_min: 6
  swing_length_max: 14
  fvg_threshold_min: 0.0002
  fvg_threshold_max: 0.0008

# ── Per-Asset-Class Tuning Ranges ──────────────────────────────
tuning_per_class:
  crypto:
    leverage_min: 3
    leverage_max: 10     # Funded-account-safe (was 20)
  forex:
    leverage_min: 5
    leverage_max: 15     # Conservative (was 20)
  stocks:
    leverage_min: 1
    leverage_max: 4
  commodities:
    leverage_min: 3
    leverage_max: 10     # Funded-account-safe (was 20)

# ── Data ──────────────────────────────────────────────────────────
data:
  exchange: "binanceusdm"  # CCXT exchange id (Binance USDT-M Futures)
  base_tf: "5m"            # Lowest timeframe to download (no 1m needed — saves 5x disk/time)
  download_tfs: ["5m", "15m", "1h", "4h", "1d"]  # All TFs fetched directly from exchange
  start_date: "2023-01-01" # 3 Jahre Daten für RL Training (Bull/Bear/Sideways Zyklen)
  history_start: "2022-01-01" # Higher-TF-History für EMA200 Warmup (1 Jahr vor start_date)
  data_dir: "data"         # Where Parquet files are stored
  # Per-asset-class data directories
  crypto_dir: "data/crypto"
  forex_dir: "data/forex"
  stocks_dir: "data/stocks"
  commodities_dir: "data/commodities"

# ── Backtest / Optuna ────────────────────────────────────────────
backtest:
  train_months: 3          # Walk-forward training window (3 months for sufficient signals)
  test_months: 2           # Walk-forward OOS window (2 months — SMC sniper needs time for 20+ trades)
  n_trials: 30             # Optuna trials per window (reduced for 4-core server)
  top_percent: 0.20        # Extract top 20 % parameter sets
  study_name: "smc_wfo"
  storage: "sqlite:///backtest/results/optuna_study.db"
  results_dir: "backtest/results"
  commission_pct: 0.0004   # 0.04 % taker fee (Binance Futures)
  slippage_pct: 0.0001     # 0.01 % estimated slippage

# ── Exchange / Broker Configuration ─────────────────────────────
# API keys are loaded from .env (never store keys in this file!)
exchanges:
  binance:
    enabled: true
    testnet: true            # Use Binance Futures Testnet
    env_key: "BINANCE_API_KEY"
    env_secret: "BINANCE_SECRET"
  oanda:
    enabled: true
    practice: true           # Use OANDA Practice (demo) account
    env_token: "OANDA_ACCESS_TOKEN"
    env_account: "OANDA_ACCOUNT_ID"
  alpaca:
    enabled: true
    paper: true              # Use Alpaca Paper Trading
    env_key: "ALPACA_API_KEY"
    env_secret: "ALPACA_API_SECRET"
    base_url: "https://paper-api.alpaca.markets/v2"

# ── Live / Paper Trading ────────────────────────────────────────
live:
  testnet: true            # Start on Binance Futures Testnet
  poll_interval_sec: 5     # Order-book polling interval
  max_open_trades: 5

# ── RL Brain (XGBoost Models) ──────────────────────────────────
rl_brain:
  enabled: true              # Master switch for all RL models
  entry_filter:
    enabled: true            # Filter entries by predicted win probability
    confidence_threshold: 0.6
    model_path: "models/rl_entry_filter.pkl"
  position_sizer:
    enabled: true            # Enabled for paper trading
    model_path: "models/rl_position_sizer.pkl"
    target_rr: 3.0           # RR target for full allocation
    min_multiplier: 0.33     # Minimum risk multiplier
    max_multiplier: 1.5      # Maximum risk multiplier
  tp_optimizer:
    enabled: false            # Disabled: v2 retrain FAILED gate (PF 1.74→1.44, actively harmful)
    model_path: "models/rl_tp_optimizer.pkl"
    max_tp_reduction: 0.3    # Max 30% TP reduction from planned
    max_tp_extension: 0.5    # Max 50% TP extension from planned
    min_tp_rr: 0.5           # Never set TP below 0.5R
  be_manager:
    enabled: true             # Enabled for paper trading (DD -29%, PF +30% in backtest)
    model_path: "models/rl_be_manager.pkl"
    min_be_rr: 0.5           # Don't trigger BE below 0.5R favorable
    fee_buffer: true         # Add fee buffer when moving to BE
  exit_classifier:
    enabled: false                  # Disabled: AUC 0.685 too low, cuts winners short (SL+TP+BE suffice)
    confidence_threshold: 0.65      # Optimal balance at 46% exit rate, +82% Sharpe
    model_path: "models/rl_exit_classifier.pkl"
    min_favorable_rr: 0.5          # Only consider exit after 0.5R favorable
    min_bars_held: 6                # Minimum 30 minutes before ML exit
    shadow_log: true                # Log predictions even when disabled
    be_ratchet_priority: true       # Suppress between 0.5R and BE trigger level

# ═══════════════════════════════════════════════════════
# DQN Exit Manager Configuration (Phase 2B)
# ═══════════════════════════════════════════════════════
dqn_exit_manager:
  enabled: true                     # Shadow mode — logs predictions alongside XGBoost
  model_path: "models/dqn_exit_manager.zip"
  shadow_log: true
  agreement_mode: "xgb_primary"    # xgb_primary | dqn_primary | both_agree
  # Training params (MacBook only, not used on server)
  training:
    buffer_size: 500000
    batch_size: 256
    learning_rate: 0.0003
    gamma: 0.99
    net_arch: [128, 128]
    gradient_steps: 4
    target_update_interval: 1000
    exploration_final_eps: 0.02

# ═══════════════════════════════════════════════════════
# Continuous Learning Configuration (Phase 4)
# ═══════════════════════════════════════════════════════
continuous_learner:
  enabled: true                      # Auto-retrain on server
  retrain_interval_hours: 1          # Check every hour if enough new trades
  min_trades_for_retrain: 50         # Retrain after 50 new trades (was 200)
  recency_halflife_trades: 200      # Exponential decay w(t) = exp(-ln2 * age/halflife)
  auc_gate: 0.55                    # Exit classifier minimum AUC
  agreement_gate: 0.80              # 80% prediction overlap required
  model_versions_keep: 5
  rollback_min_trades: 20           # Min trades before evaluating rollback
  rollback_cumulative_pnl: -0.03    # Rollback if cumPnL < -3% after min_trades
  rollback_min_winrate: 0.20        # Rollback if WR < 20% after min_trades
  min_validation_trades: 15          # Minimum trades in validation split (30% of live)
  validation_split: 0.30             # Fraction of live trades for walk-forward validation
  backtest_subsample_per_class: 50000  # Subsample backtest data per asset class (200K total)
  grade_weights:
    A+: 1.5
    A: 1.5
    B+: 1.0
    B: 1.0
    C: 1.0
    D: 1.5
  timeout_weight: 2.0                # Weight multiplier for timeout exits (informative negatives)

# ═══════════════════════════════════════════════════════
# Trade Journal Configuration
# ═══════════════════════════════════════════════════════
journal:
  enabled: true
  db_path: "trade_journal/journal.db"
  batch_flush_seconds: 30
  max_error_count: 10
  error_window_seconds: 300
  post_trade_bars: 50
  max_concurrent_watchers: 20
  max_db_size_mb: 1024              # Disable writes if journal.db > 1GB
  min_disk_free_mb: 500             # Disable writes if free disk < 500MB

# ═══════════════════════════════════════════════════════
# Dashboard Configuration
# ═══════════════════════════════════════════════════════
dashboard:
  pin: "1234"
  username: "admin"
  password: "changeme"             # Override on server — never commit real password
  host: "0.0.0.0"
  port: 8080